<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <!--
    Patrón de fondo para el portal de padres Kinetic.
    Reemplaza el URL efímero del CDN de Stitch que expiró.
    Estilo: orgánico, soft, pediátrico — formas redondeadas en tonos del primary
    Kinetic (#00675c teal) + acentos suaves de los colores secundarios.
  -->
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6f5f3" />
      <stop offset="50%" stop-color="#f5f9fa" />
      <stop offset="100%" stop-color="#fef5e5" />
    </linearGradient>
    <radialGradient id="circle-teal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00675c" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#00675c" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="circle-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f7b945" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#f7b945" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="circle-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7cc74f" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#7cc74f" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="circle-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e5316e" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#e5316e" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Base gradient -->
  <rect width="800" height="600" fill="url(#bg-gradient)" />

  <!-- Soft floating organic shapes -->
  <circle cx="100" cy="80" r="180" fill="url(#circle-teal)" />
  <circle cx="700" cy="120" r="160" fill="url(#circle-amber)" />
  <circle cx="200" cy="450" r="200" fill="url(#circle-green)" />
  <circle cx="650" cy="500" r="170" fill="url(#circle-pink)" />
  <circle cx="400" cy="280" r="220" fill="url(#circle-teal)" />

  <!-- Small floating decorative dots / blobs (very subtle) -->
  <g opacity="0.5">
    <circle cx="150" cy="200" r="3" fill="#00675c" opacity="0.3" />
    <circle cx="380" cy="100" r="4" fill="#7cc74f" opacity="0.25" />
    <circle cx="580" cy="240" r="3" fill="#f7b945" opacity="0.3" />
    <circle cx="720" cy="340" r="5" fill="#00675c" opacity="0.2" />
    <circle cx="250" cy="380" r="3" fill="#e5316e" opacity="0.25" />
    <circle cx="500" cy="450" r="4" fill="#7cc74f" opacity="0.25" />
    <circle cx="80" cy="320" r="3" fill="#f7b945" opacity="0.3" />
    <circle cx="440" cy="540" r="3" fill="#00675c" opacity="0.25" />
  </g>
</svg>
