<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <!--
    Patrón de fondo para el portal de padres Kinetic.
    Formas sólidas planas (sin gradients radiales) en la paleta Kinetic.
    El contenedor que monta este SVG usa opacity-[0.07] mobile / opacity-20
    desktop, así que el aporte real es bastante sutil.
  -->

  <!-- Base color soft -->
  <rect width="1600" height="1000" fill="#f0f6f6" />

  <!-- Círculos sólidos grandes (paleta Kinetic, fills planos) -->
  <circle cx="200" cy="180" r="280" fill="#00675c" />
  <circle cx="1400" cy="220" r="260" fill="#f7b945" />
  <circle cx="380" cy="800" r="320" fill="#7cc74f" />
  <circle cx="1280" cy="820" r="280" fill="#e5316e" />
  <circle cx="800" cy="500" r="380" fill="#00675c" />
  <circle cx="1100" cy="100" r="180" fill="#5bd4ff" />
  <circle cx="100" cy="500" r="200" fill="#f7b945" />
  <circle cx="900" cy="900" r="220" fill="#5bd4ff" />

  <!-- Dots decorativos sólidos -->
  <circle cx="300" cy="380" r="6" fill="#00675c" />
  <circle cx="760" cy="180" r="8" fill="#7cc74f" />
  <circle cx="1160" cy="440" r="6" fill="#f7b945" />
  <circle cx="1440" cy="640" r="9" fill="#00675c" />
  <circle cx="500" cy="700" r="6" fill="#e5316e" />
  <circle cx="1000" cy="830" r="8" fill="#7cc74f" />
  <circle cx="160" cy="640" r="6" fill="#f7b945" />
  <circle cx="880" cy="980" r="6" fill="#00675c" />
  <circle cx="1500" cy="300" r="5" fill="#e5316e" />
  <circle cx="640" cy="940" r="8" fill="#5bd4ff" />
  <circle cx="1320" cy="100" r="6" fill="#7cc74f" />
  <circle cx="60" cy="200" r="5" fill="#f7b945" />
</svg>
